<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0 text-center">Create New Question</h4>
    </div>
    <div class="card-body">
      <form [formGroup]="questionForm" (ngSubmit)="submitQuestion()">
        
        <div class="mb-3">
          <label class="form-label">Question Title</label>
          <input type="text" class="form-control" formControlName="questionTitle" placeholder="Enter question">
          <div class="text-danger" *ngIf="questionForm.get('questionTitle')?.invalid && questionForm.get('questionTitle')?.touched">Question is required</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Category</label>
          <select class="form-select" formControlName="category">
            <option value="">Select category</option>
            <option value="Math">Math</option>
            <option value="Science">Science</option>
            <option value="History">History</option>
            <option value="Programming">Programming</option>
          </select>
          <div class="text-danger" *ngIf="questionForm.get('category')?.invalid && questionForm.get('category')?.touched">Category is required</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Difficulty Level</label>
          <select class="form-select" formControlName="difficultyLevel">
            <option value="">Select difficulty</option>
            <option value="EASY">Easy</option>
            <option value="MEDIUM">Medium</option>
            <option value="HARD">Hard</option>
          </select>
          <div class="text-danger" *ngIf="questionForm.get('difficultyLevel')?.invalid && questionForm.get('difficultyLevel')?.touched">Difficulty is required</div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Option 1</label>
            <input type="text" class="form-control" formControlName="option1">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Option 2</label>
            <input type="text" class="form-control" formControlName="option2">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Option 3</label>
            <input type="text" class="form-control" formControlName="option3">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Option 4</label>
            <input type="text" class="form-control" formControlName="option4">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Correct Answer</label>
          <input type="text" class="form-control" formControlName="rightAnswer">
        </div>

        <button type="submit" class="btn btn-success w-100" [disabled]="questionForm.invalid">
          Submit Question
        </button>
      </form>
    </div>
  </div>
</div>
