<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" [routerLink]="['/']">Admin Panel</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a [routerLink]="['/admin/create-quiz']" class="nav-link">Create Quiz</a>
        </li>
        <li class="nav-item">
          <a [routerLink]="['/admin/create-question']" class="nav-link">Create Question</a>
        </li>
        <li class="nav-item">
          <a [routerLink]="['/admin/creator/quizzes']" class="nav-link">My Quizzes</a>
        </li>
        <li class="nav-item">
          <a [routerLink]="['/admin/results/all', quizTitle]" class="nav-link">All Results</a>
        </li>
        <li class="nav-item">
          <a [routerLink]="['/admin/participant/quiz', quizTitle]" class="nav-link">Take Quiz as Participant</a>
        </li>
        <li class="nav-item">
          <a [routerLink]="['/admin/quiz/view', quizTitle]" class="nav-link">View Created Quiz</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="mt-5 text-center">
  <h2>Welcome to the Admin Dashboard</h2>
  <p>Use the navbar to create quizzes, add questions, and view results.</p>
</div>

<div class="container mt-4">
  <div class="row">
    <!-- Created Quizzes -->
    <div class="col-md-6">
      <h4 class="text-primary">Your Created Quizzes</h4>
      <app-creator-quiz-list (viewQuiz)="viewCreatedQuiz($event)"></app-creator-quiz-list>
    </div>

    <!-- Taken Quizzes -->
    <div class="col-md-6">
      <h4 class="text-success">Quizzes You've Taken</h4>
      <ul class="list-group">
        <li 
          class="list-group-item d-flex justify-content-between align-items-center"
          *ngFor="let title of takenQuizzes">
          {{ title }}
          <button class="btn btn-outline-primary btn-sm" (click)="viewParticipantResult(title)">
            View Result
          </button>
        </li>
      </ul>
    </div>
  </div>
</div>
<router-outlet></router-outlet>
