<div class="container mt-5">

  <!-- Header -->
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div *ngIf="isLoaded && result" class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Result for "{{ result.quizTitle }}"</h4>
        </div>
        <div class="card-body">
          <p class="mb-2"><strong>User:</strong> {{ result.userName }}</p>
          <p class="mb-2"><strong>Total Questions:</strong> {{ result.totalQuestion }}</p>
          <p class="mb-2 text-success"><strong>Correct:</strong> {{ result.correctAnswer }}</p>
          <p class="mb-2 text-danger"><strong>Incorrect:</strong> {{ result.incorrectAnswer }}</p>
          <p class="mb-0"><strong>Score:</strong> {{ result.percentage }}%</p>
        </div>
      </div>

      <div *ngIf="hasError" class="alert alert-danger mt-4">
        Error loading result. Please try again later.
      </div>
    </div>
  </div>

</div>
