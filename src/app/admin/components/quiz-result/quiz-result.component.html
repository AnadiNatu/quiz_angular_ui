<div class="result-wrapper" *ngIf="isLoaded && result">
  <div class="glass-card animate-fade-in">
    <h2 class="quiz-title">Result for "{{result.quizTitle}}"</h2>
    <div class="quiz-details">
      <p><strong>User : </strong> {{result.userName}}</p>
      <p> <strong>Total Questions : </strong> {{result.totalQuestion}}</p>
      <p class="correct"><strong>Correct :</strong>{{result.totalQuestion}}</p>
      <p class="incorrect"><strong>Incorrect :</strong>{{result.incorrectAnswer}}</p>
      <p><strong>Score :</strong>{{result.percentage}}</p>
    </div>
  </div>
</div>

<div *ngIf="hasError" class="error-message animate-fade-in">
⚠️ Error loading result. Please try again later.
</div>
