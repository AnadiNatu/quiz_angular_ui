<div class="glass-container">
  <div class="glass-card">
    <h2>Create New Quiz</h2>
    <form [formGroup]="quizForm" (ngSubmit)="createQuiz()">

      <label>Title</label>
      <input type="text" class="form-control"
             formControlName="title" placeholder="Enter quiz title" />

      <label>Category</label>
      <select class="form-select" formControlName="category"
              (change)="onCategoryChange()">
        <option value="" disabled selected>Select category</option>
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>
      <div *ngIf="availableQuestions > 0" class="info-box">
        📊 Available questions: <strong>{{ availableQuestions }}</strong>
      </div>

      <label>Difficulty Level</label>
      <select class="form-select" formControlName="difficultyLevel"
              (change)="onDifficultyChange()">
        <option value="" disabled selected>Select difficulty</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>

      <label>Number of Questions</label>
      <div class="question-row">
        <select class="form-select" formControlName="numberOfQuestions">
          <option value="" disabled selected>Select number</option>
          <option *ngFor="let q of questionOptions" [value]="q">{{ q }}</option>
        </select>
        <button type="button" class="max-btn"
                (click)="setMaxQuestions()">
          Use Max ({{ maxQuestions }})
        </button>
      </div>

      <button class="glass-button" type="submit"
              [disabled]="quizForm.invalid || maxQuestions === 0">
        Create Quiz
      </button>

    </form>
  </div>
</div>
