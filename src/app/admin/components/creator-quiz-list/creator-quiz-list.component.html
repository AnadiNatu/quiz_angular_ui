<div class="container mt-4">
  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div *ngIf="quizzes.length > 0">
    <div class="card shadow-sm mb-3" *ngFor="let quiz of quizzes">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h5 class="card-title mb-1">{{ quiz.title }}</h5>
          <p class="card-text mb-0">
            <small class="text-muted">{{ quiz.category }} | {{ quiz.difficultyLevel }}</small>
          </p>
        </div>
        <button class="btn btn-outline-primary btn-sm" (click)="onViewQuiz(quiz.title)">
          View Questions
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="quizzes.length === 0 && !errorMessage" class="text-center text-muted mt-5">
    <p>No quizzes found.</p>
  </div>
</div>
