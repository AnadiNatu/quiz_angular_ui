<div class="quiz-list-container">

  <div *ngIf="showAllQuizzes" class="search-row mb-3">
    <input type="text"
           class="form-control"
           [(ngModel)]="searchText"
           placeholder="Search quizzes by title..." />
    <button class="glass-button search-btn" (click)="onSearch()">Search</button>
  </div>

  <div *ngIf="errorMessage" class="alert-danger">{{ errorMessage }}</div>

  <ng-container *ngIf="quizzes.length > 0; else emptyState">
    <div class="quiz-card"
         *ngFor="let quiz of quizzes"
         (mouseenter)="hoveredId = quiz.id"
         (mouseleave)="hoveredId = 0"
         [class.expanded]="hoveredId === quiz.id">

      <h4>{{ quiz.title }}</h4>

      <div class="quiz-details">
        <p><strong>Category:</strong>    {{ quiz.category }}</p>
        <p><strong>Difficulty:</strong>  {{ quiz.difficultyLevel }}</p>
        <p><strong>Creator:</strong>     {{ quiz.creatorUsername }}</p>
        <p><strong>Questions:</strong>   {{ quiz.questionIds?.length ?? 0 }}</p>
        <p><strong>Participants:</strong>{{ quiz.participantIds?.length ?? 0 }}</p>

        <div class="card-buttons">
          <button class="glass-button"
                  (click)="viewQuizDetails(quiz); $event.stopPropagation()">
            Details
          </button>
          <button class="glass-button"
                  (click)="takeQuiz(quiz); $event.stopPropagation()">
            Take Quiz
          </button>
          <button class="glass-button alt"
                  (click)="onViewResults(quiz); $event.stopPropagation()">
            Results
          </button>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #emptyState>
    <p *ngIf="!errorMessage" class="empty-msg">No quizzes found.</p>
  </ng-template>

</div>
