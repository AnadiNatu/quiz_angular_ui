<!-- Foreground content with blur -->
<!-- Background image wrapper -->
<div class="background-wrapper" style="background-image: url('/assets/images/signup-bg.jpg');"></div>

<!-- Foreground content with blur -->
<div class="glass-container">
  <div class="glass-signup-card">
    <h2 class="text-center mb-4">Create Your Account</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-control" [(ngModel)]="signUpData.name" name="name" placeholder="Enter your full name" required />
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" [(ngModel)]="signUpData.username" name="username" type="email" placeholder="Enter your email" required />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" [(ngModel)]="signUpData.password" name="password" type="password" placeholder="Enter a strong password" required />
      </div>

      <div class="form-group">
        <label class="form-label">Age</label>
        <input class="form-control" [(ngModel)]="signUpData.age" name="age" type="number" placeholder="Your age" required min="0" />
      </div>

      <div class="form-group">
        <label class="form-label">Select Your Role</label>
        <div class="role-button-group">
          <button type="button"
                  class="role-button"
                  [class.active-role]="signUpData.roleNumber === 0"
                  (click)="signUpData.roleNumber = 0">Admin</button>
          <button type="button"
                  class="role-button"
                  [class.active-role]="signUpData.roleNumber === 2"
                  (click)="signUpData.roleNumber = 2">Creator</button>
          <button type="button"
                  class="role-button"
                  [class.active-role]="signUpData.roleNumber === 1"
                  (click)="signUpData.roleNumber = 1">Participant</button>
        </div>
      </div>

      <button type="submit" class="glass-button mt-3">Sign Up</button>
    </form>

    <div class="text-center mt-3">
      <a routerLink="/login" class="glass-button-sm">Already have an account? Login</a>
    </div>
  </div>
</div>
