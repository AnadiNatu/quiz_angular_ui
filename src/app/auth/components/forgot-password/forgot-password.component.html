<div class="container mt-4">

    <h2>Forgot Password</h2>
    <form (ngSubmit) = "onSubmit()">
        <div class="form-group">
            <label> Email </label>
            <input [(ngModel)]="email" name="email" required type="email" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary mt-3">Send Reset Password</button>
    </form>
    <p class="text-success mt-3" *ngIf="message">{{ message }}</p>
    <p class="text-danger mt-3" *ngIf="error">{{ error }}</p>
</div>
