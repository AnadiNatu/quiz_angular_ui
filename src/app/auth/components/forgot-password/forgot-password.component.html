<div class="glass-container">
  <div class="glass-card forgot-card">

    <div class="card-header-section text-center">
      <div class="logo-icon">🔑</div>
      <h2>Forgot Password</h2>
      <p class="subtitle">
        Enter your registered email and we'll send you a reset link.
      </p>
    </div>

    <form (ngSubmit)="onSendResetLink()">
      <div class="form-group mb-3">
        <label for="emailInput" class="form-label">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">📧</span>
          <input
            id="emailInput"
            [(ngModel)]="userEmail"
            name="email"
            type="email"
            class="form-control"
            placeholder="Enter your registered email"
            required
          />
        </div>
      </div>

      <div *ngIf="successMessage" class="alert-glass alert-success-glass mt-2">
        ✅ {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="alert-glass alert-danger-glass mt-2">
        ⚠️ {{ errorMessage }}
      </div>

      <button type="submit" class="glass-button w-100 mt-3">
        Send Reset Link
      </button>
    </form>

    <div class="text-center mt-3">
      <span class="text-muted-light">Remember your password?</span>
      <a routerLink="/login" class="glass-link-btn ms-1">Back to Login</a>
    </div>

  </div>
</div>
