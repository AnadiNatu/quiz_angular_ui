<div class="glass-container">
  <div class="glass-card forgot-card">
    <h2 class="text-center">Forgot Password</h2>

    <form (ngSubmit)="onSendResetLink()">
      <div class="form-group mb-3">
        <label for="emailInput" class="form-label">Email Address</label>
        <input
          [(ngModel)]="userEmail"
          name="email"
          id="emailInput"
          type="email"
          class="form-control"
          placeholder="Enter your registered email"
          required
        />
      </div>

      <button type="submit" class="glass-button">Send Reset Link</button>
    </form>

    <div *ngIf="successMessage" class="alert alert-success mt-3 text-center">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger mt-3 text-center">
      {{ errorMessage }}
    </div>
  </div>
</div>
