<p>reset-password works!</p>

<div class="container mt-4">
  <h2>Reset Password</h2>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email" name="email" type="email" required class="form-control" />
    </div>
    <div class="form-group">
      <label>Reset Token</label>
      <input [(ngModel)]="token" name="token" required class="form-control" />
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input [(ngModel)]="newPassword" name="newPassword" type="password" required class="form-control" />
    </div>
    <button type="submit" class="btn btn-success mt-3">Reset Password</button>
  </form>

  <p class="text-success mt-3" *ngIf="message">{{ message }}</p>
  <p class="text-danger mt-3" *ngIf="error">{{ error }}</p>
</div>
