<div class="glass-container">
  <div class="glass-card reset-card">

    <div class="card-header-section text-center">
      <div class="logo-icon">🔐</div>
      <h2>Reset Password</h2>
      <p class="subtitle">Create a new secure password for your account.</p>
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">📧</span>
          <input type="email"
                 name="email"
                 [(ngModel)]="email"
                 class="form-control readonly-field"
                 readonly />
        </div>
        <p class="field-hint">Auto-filled from your request</p>
      </div>

      <div class="form-group mb-3">
        <label class="form-label">Reset Token</label>
        <div class="input-wrapper">
          <span class="input-icon">🎟️</span>
          <input type="text"
                 name="token"
                 [(ngModel)]="token"
                 class="form-control readonly-field"
                 readonly
                 placeholder="Token from email" />
        </div>
        <p class="field-hint">Auto-filled — paste manually if needed</p>
      </div>

      <div class="form-group mb-3">
        <label class="form-label">New Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password"
                 name="newPassword"
                 [(ngModel)]="newPassword"
                 class="form-control"
                 placeholder="Enter your new password"
                 required
                 minlength="6" />
        </div>
      </div>

      <div *ngIf="message" class="alert-glass alert-success-glass mt-2">
        ✅ {{ message }}
      </div>
      <div *ngIf="error" class="alert-glass alert-danger-glass mt-2">
        ⚠️ {{ error }}
      </div>

      <button type="submit" class="glass-button w-100 mt-3"
              [disabled]="!newPassword">
        Reset Password
      </button>

    </form>

    <div class="text-center mt-3">
      <a routerLink="/login" class="glass-link-btn">← Back to Login</a>
    </div>

  </div>
</div>
