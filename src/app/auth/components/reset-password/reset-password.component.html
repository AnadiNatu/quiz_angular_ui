<div class="glass-container">
  <div class="glass-card reset-card">
    <h2 class="text-center">Reset Password</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" [(ngModel)]="email" class="form-control" readonly>
      </div>

      <input type="hidden" [(ngModel)]="token" name="token">

      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" name="newPassword" class="form-control" placeholder="Enter new Password" required>
      </div>

      <button class="glass-button" type="submit">Reset Password</button>
    </form>

    <div *ngIf="message" class="alert alert-success mt-3 text-center">
      {{ message }}
    </div>
    <div *ngIf="error" class="alert alert-danger mt-3 text-center">
      {{ error }}
    </div>
  </div>
</div>
