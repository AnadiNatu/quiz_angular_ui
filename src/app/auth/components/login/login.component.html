<div class="glass-container">
  <div class="glass-login-card" (mouseenter)="hovered = true" (mouseleave)="hovered = false">
    <h2 class="text-center mb-4">Login</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          id="email"
          class="form-control"
          [(ngModel)]="loginData.username"
          name="username"
          placeholder="Email"
          required
        />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          class="form-control"
          [(ngModel)]="loginData.password"
          name="password"
          type="password"
          placeholder="Password"
          required
        />
      </div>

      <button type="submit" class="glass-button">Login</button>
    </form>

    <div class="text-center mt-3">
      <a routerLink="/forgot-password" class="glass-button-sm">Forgot Password?</a><br />
      <a routerLink="/reset-password" class="glass-button-sm">Reset Password</a>
    </div>
  </div>
</div>
