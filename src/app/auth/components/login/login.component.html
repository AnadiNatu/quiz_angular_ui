<div class="glass-container">
  <div class="glass-login-card">
    <div class="card-header-section">
      <div class="logo-icon">🎓</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your Quiz Platform account</p>
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            id="username"
            class="form-control"
            [(ngModel)]="loginData.username"
            name="username"
            placeholder="Enter your username"
            required
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            class="form-control"
            [(ngModel)]="loginData.password"
            name="password"
            type="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert-glass alert-danger-glass mt-2">
        ⚠️ {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="glass-button w-100 mt-3"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        {{ isLoading ? 'Signing in...' : 'Login' }}
      </button>

    </form>

    <div class="divider">
      <span>or</span>
    </div>

    <div class="links-section text-center">
      <a routerLink="/forgot-password" class="glass-link-btn">
        🔑 Forgot Password?
      </a>
      <div class="mt-2">
        <span class="text-muted-light">Don't have an account?</span>
        <a routerLink="/signup" class="glass-link-btn ms-1">Sign Up</a>
      </div>
    </div>

  </div>
</div>
